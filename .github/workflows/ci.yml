name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Set up Python
        run: uv python install
      - name: Sync dependencies
        run: uv sync --dev
      - name: Run tests
        run: uv run pytest
      - name: Build distributions
        run: uv build
